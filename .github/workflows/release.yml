name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  gate:
    uses: ./.github/workflows/base.yml

  publish:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare stamp Dockerfile
        run: |
          cat > /tmp/stamp.Dockerfile << 'EOF'
          ARG S
          FROM ${S}
          ARG SHA
          ENV ADDA_DEV_RUNTIME_IMAGE_COMMIT_SHA=${SHA}
          EOF

      - name: Stamp and push adda-dev-runtime :version :latest
        id: stamp
        uses: docker/build-push-action@v6
        with:
          file: /tmp/stamp.Dockerfile
          context: .
          build-args: |
            S=ghcr.io/nightjarrr/adda-dev-runtime:${{ github.sha }}
            SHA=${{ github.sha }}
          tags: |
            ghcr.io/nightjarrr/adda-dev-runtime:${{ github.ref_name }}
            ghcr.io/nightjarrr/adda-dev-runtime:latest
          push: true

      - name: Attest adda-dev-runtime build provenance
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/nightjarrr/adda-dev-runtime
          subject-digest: ${{ steps.stamp.outputs.digest }}
          push-to-registry: true

      - name: Retag proto-adda :version :latest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/nightjarrr/proto-adda-dev-runtime:${{ github.ref_name }} \
            --tag ghcr.io/nightjarrr/proto-adda-dev-runtime:latest \
            ghcr.io/nightjarrr/proto-adda-dev-runtime:${{ github.sha }}

      - name: Resolve proto-adda digest
        id: proto-digest
        run: |
          digest=$(docker buildx imagetools inspect ghcr.io/nightjarrr/proto-adda-dev-runtime:${{ github.sha }} --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Attest proto-adda build provenance
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/nightjarrr/proto-adda-dev-runtime
          subject-digest: ${{ steps.proto-digest.outputs.digest }}
          push-to-registry: true

      - name: Package launcher
        run: tar -czf adda-dev-launcher-${{ github.ref_name }}.tar.gz -C launcher .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: adda-dev-launcher-*.tar.gz
