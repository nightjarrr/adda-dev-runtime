name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  gate:
    uses: ./.github/workflows/base.yml

  publish:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp and push adda-dev-runtime :version :latest
        run: |
          printf 'ARG S\nFROM ${S}\nARG SHA\nENV ADDA_DEV_RUNTIME_IMAGE_COMMIT_SHA=${SHA}\n' \
            | docker build \
                --build-arg S="ghcr.io/nightjarrr/adda-dev-runtime:${{ github.sha }}" \
                --build-arg SHA="${{ github.sha }}" \
                -t ghcr.io/nightjarrr/adda-dev-runtime:${{ github.ref_name }} \
                -t ghcr.io/nightjarrr/adda-dev-runtime:latest \
                -
          docker push ghcr.io/nightjarrr/adda-dev-runtime:${{ github.ref_name }}
          docker push ghcr.io/nightjarrr/adda-dev-runtime:latest

      - name: Retag proto-adda :version :latest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/nightjarrr/proto-adda-dev-runtime:${{ github.ref_name }} \
            --tag ghcr.io/nightjarrr/proto-adda-dev-runtime:latest \
            ghcr.io/nightjarrr/proto-adda-dev-runtime:${{ github.sha }}

      - name: Package launcher
        run: tar -czf adda-dev-launcher-${{ github.ref_name }}.tar.gz -C launcher .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: adda-dev-launcher-*.tar.gz
