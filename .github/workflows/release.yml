name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  gate:
    uses: ./.github/workflows/base.yml

  publish:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata — adda-dev-runtime
        id: meta-base
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nightjarrr/adda-dev-runtime
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push adda-dev-runtime
        uses: docker/build-push-action@v6
        with:
          push: true
          file: adda-dev-runtime/Dockerfile
          context: .
          tags: ${{ steps.meta-base.outputs.tags }}

      - name: Docker metadata — proto-adda
        id: meta-proto
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nightjarrr/proto-adda-dev-runtime
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push proto-adda
        uses: docker/build-push-action@v6
        with:
          push: true
          file: proto-adda/Dockerfile
          context: .
          build-args: BASE_TAG=${{ steps.meta-base.outputs.version }}
          tags: ${{ steps.meta-proto.outputs.tags }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: launcher/*
