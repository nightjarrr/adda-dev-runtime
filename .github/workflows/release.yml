name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  gate:
    uses: ./.github/workflows/base.yml

  publish:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag adda-dev-runtime :version + :latest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/nightjarrr/adda-dev-runtime:${{ github.ref_name }} \
            --tag ghcr.io/nightjarrr/adda-dev-runtime:latest \
            ghcr.io/nightjarrr/adda-dev-runtime:${{ github.sha }}

      - name: Tag proto-adda :version + :latest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/nightjarrr/proto-adda-dev-runtime:${{ github.ref_name }} \
            --tag ghcr.io/nightjarrr/proto-adda-dev-runtime:latest \
            ghcr.io/nightjarrr/proto-adda-dev-runtime:${{ github.sha }}

      - name: Package launcher
        run: tar -czf adda-dev-launcher-${{ github.ref_name }}.tar.gz -C launcher .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: adda-dev-launcher-*.tar.gz
