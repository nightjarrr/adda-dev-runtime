name: edge

on:
  schedule:
    - cron: '0 4 * * 0'  # weekly, Sunday 04:00 UTC (1h after cleanup)
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  gate:
    uses: ./.github/workflows/base.yml

  publish:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp and push adda-dev-runtime :edge
        run: |
          printf 'ARG S\nFROM ${S}\nARG SHA\nENV ADDA_DEV_RUNTIME_IMAGE_COMMIT_SHA=${SHA}\n' \
            | docker build \
                --build-arg S="ghcr.io/nightjarrr/adda-dev-runtime:${{ github.sha }}" \
                --build-arg SHA="${{ github.sha }}" \
                -t ghcr.io/nightjarrr/adda-dev-runtime:edge \
                -
          docker push ghcr.io/nightjarrr/adda-dev-runtime:edge

      - name: Retag proto-adda :edge
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/nightjarrr/proto-adda-dev-runtime:edge \
            ghcr.io/nightjarrr/proto-adda-dev-runtime:${{ github.sha }}
