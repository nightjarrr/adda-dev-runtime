name: edge

on:
  push:
    branches:
      - main

jobs:
  gate:
    uses: ./.github/workflows/base.yml

  publish:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push adda-dev-runtime
        uses: docker/build-push-action@v6
        with:
          push: true
          file: adda-dev-runtime/Dockerfile
          context: .
          tags: ghcr.io/nightjarrr/adda-dev-runtime:edge

      - name: Build and push proto-adda
        uses: docker/build-push-action@v6
        with:
          push: true
          file: proto-adda/Dockerfile
          context: .
          build-args: BASE_TAG=edge
          tags: ghcr.io/nightjarrr/proto-adda-dev-runtime:edge
