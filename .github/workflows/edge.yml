name: edge

on:
  push:
    branches:
      - main

jobs:
  gate:
    uses: ./.github/workflows/base.yml

  publish:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag adda-dev-runtime :edge
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/nightjarrr/adda-dev-runtime:edge \
            ghcr.io/nightjarrr/adda-dev-runtime:${{ github.sha }}

      - name: Tag proto-adda :edge
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/nightjarrr/proto-adda-dev-runtime:edge \
            ghcr.io/nightjarrr/proto-adda-dev-runtime:${{ github.sha }}
