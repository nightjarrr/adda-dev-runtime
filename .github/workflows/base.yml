name: build-and-lint

on:
  workflow_call:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: |
          shellcheck \
            adda-dev-runtime/content/scripts/entrypoint.sh.source \
            adda-dev-runtime/content/scripts/resolve-issue-branch.sh.source \
            adda-dev-runtime/content/scripts/ci-watch.sh.source \
            adda-dev-runtime/content/scripts/quality-gates.sh.source \
            launcher/adda-dev.sh \
            proto-adda/content/entrypoint.d/10-claude-config.sh.source

      - name: hadolint (adda-dev-runtime)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: adda-dev-runtime/Dockerfile

      - name: hadolint (proto-adda)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: proto-adda/Dockerfile

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install tsc and @types/bun globally
        run: BUN_INSTALL=/usr/local bun install -g typescript@6.0.3 @types/bun@1.3.14

      - name: Lint (biome)
        run: bunx @biomejs/biome@2.4.15 check adda-dev-runtime/src/

      - name: Type check (tsc)
        run: tsc --noEmit

      - name: Test
        run: bun test --coverage

      - name: Build (pre-check)
        run: bun build adda-dev-runtime/src/*.ts --outdir /tmp/ci-build-check/ --target bun

      - name: Build adda-dev-runtime
        run: docker build -t adda-dev-runtime:ci -f adda-dev-runtime/Dockerfile .

      - name: Tag adda-dev-runtime for proto-adda build
        run: docker tag adda-dev-runtime:ci ghcr.io/nightjarrr/adda-dev-runtime:ci

      - name: Build proto-adda
        run: docker build -t proto-adda:ci --build-arg BASE_TAG=ci -f proto-adda/Dockerfile .

      - name: Smoke test — adda-dev-runtime
        run: |
          docker run --rm --entrypoint sh adda-dev-runtime:ci -c '
            set -eu
            [ "$(whoami)" = "adda" ]
            [ "$(id -u)" = "1000" ]
            command -v git >/dev/null
            command -v gh >/dev/null
            command -v socat >/dev/null
            test -x /usr/local/libexec/adda-dev-runtime/entrypoint.sh
            test -x /usr/local/libexec/adda-dev-runtime/resolve-issue-branch.sh
            test -x /usr/local/libexec/adda-dev-runtime/ci-watch.sh
            test -x /usr/local/libexec/adda-dev-runtime/quality-gates.sh
            test -x /usr/local/libexec/adda-dev-runtime/hello
          '

      - name: Smoke test — proto-adda
        run: |
          docker run --rm --entrypoint sh proto-adda:ci -c '
            set -eu
            [ "$(whoami)" = "adda" ]
            [ "$(id -u)" = "1000" ]
            test -d /usr/local/share/adda-dev-runtime/.claude
          '
