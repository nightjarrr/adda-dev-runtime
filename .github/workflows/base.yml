name: build-and-lint
# Shared reusable workflow: called by ci.yml, edge.yml (gate), and release.yml (gate).
on:
  workflow_call:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: shellcheck
        run: |
          shellcheck \
            adda-dev-runtime/content/scripts/entrypoint.sh.source \
            launcher/adda-dev.sh \
            proto-adda/content/entrypoint.d/10-claude-config.sh.source

      - name: hadolint (adda-dev-runtime)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: adda-dev-runtime/Dockerfile

      - name: hadolint (proto-adda)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: proto-adda/Dockerfile

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install tsc and @types/bun globally
        run: sudo env PATH="$PATH" BUN_INSTALL=/usr/local bun install -g typescript@6.0.3 @types/bun@1.3.14

      - name: Lint (biome)
        run: bunx @biomejs/biome@2.4.15 check adda-dev-runtime/src/

      - name: Type check (tsc)
        run: tsc --noEmit

      - name: Test
        run: bun test --coverage

      - name: Build (pre-check)
        run: bun build adda-dev-runtime/src/*.ts --outdir /tmp/ci-build-check/ --target bun

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build adda-dev-runtime
        uses: docker/build-push-action@v6
        with:
          push: true
          file: adda-dev-runtime/Dockerfile
          context: .
          tags: ghcr.io/nightjarrr/adda-dev-runtime:ci
          cache-from: type=registry,ref=ghcr.io/nightjarrr/adda-dev-runtime:buildcache
          cache-to: type=registry,ref=ghcr.io/nightjarrr/adda-dev-runtime:buildcache,mode=max

      - name: Build proto-adda
        uses: docker/build-push-action@v6
        with:
          push: true
          file: proto-adda/Dockerfile
          context: .
          build-args: BASE_TAG=ci
          tags: ghcr.io/nightjarrr/proto-adda-dev-runtime:ci
          cache-from: type=registry,ref=ghcr.io/nightjarrr/proto-adda-dev-runtime:buildcache
          cache-to: type=registry,ref=ghcr.io/nightjarrr/proto-adda-dev-runtime:buildcache,mode=max

      - name: Smoke test — adda-dev-runtime
        run: |
          docker run --rm --entrypoint sh ghcr.io/nightjarrr/adda-dev-runtime:ci -c '
            set -eu
            [ "$(whoami)" = "adda" ]
            [ "$(id -u)" = "1000" ]
            command -v git >/dev/null
            command -v gh >/dev/null
            command -v socat >/dev/null
            test -x /usr/local/libexec/adda-dev-runtime/entrypoint.sh
            test -x /usr/local/libexec/adda-dev-runtime/resolve-issue-branch
            test -x /usr/local/libexec/adda-dev-runtime/ci-watch
            test -x /usr/local/libexec/adda-dev-runtime/quality-gates
          '

      - name: Smoke test — proto-adda
        run: |
          docker run --rm --entrypoint sh ghcr.io/nightjarrr/proto-adda-dev-runtime:ci -c '
            set -eu
            [ "$(whoami)" = "adda" ]
            [ "$(id -u)" = "1000" ]
            test -d /usr/local/share/adda-dev-runtime/.claude
          '
