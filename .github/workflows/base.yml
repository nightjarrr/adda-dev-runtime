name: build-and-lint
# Shared reusable workflow: called by ci.yml, edge.yml (gate), and release.yml (gate).
on:
  workflow_call:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check Dockerfile changes
        id: df-changed
        run: |
          diff_files=$(git diff --name-only HEAD~1 HEAD -- '*/Dockerfile')
          if [ -n "${diff_files}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check TS/Bun changes
        id: ts-changed
        run: |
          diff_files=$(git diff --name-only HEAD~1 HEAD -- \
            ':(glob)**/*.ts' 'tsconfig.json' 'package.json')
          if [ -n "${diff_files}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: shellcheck
        run: |
          shellcheck \
            adda-dev-runtime/content/scripts/bootstrap/entrypoint.sh.source \
            adda-dev-runtime/build/prune-node-modules.sh \
            launcher/adda-dev.sh \
            proto-adda/content/scripts/bootstrap/entrypoint.d/10-claude-config.sh.source

      - name: hadolint
        if: steps.df-changed.outputs.changed == 'true'
        run: |
          docker run --rm -i ghcr.io/hadolint/hadolint:v2.12.0-debian < adda-dev-runtime/Dockerfile
          docker run --rm -i ghcr.io/hadolint/hadolint:v2.12.0-debian < proto-adda/Dockerfile

      - name: Set up Bun
        if: steps.ts-changed.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install tsc globally
        if: steps.ts-changed.outputs.changed == 'true'
        run: sudo env PATH="$PATH" BUN_INSTALL=/usr/local bun install -g typescript@6.0.3

      - name: Lint (biome)
        if: steps.ts-changed.outputs.changed == 'true'
        run: bunx @biomejs/biome@2.4.15 check adda-dev-runtime/src/ proto-adda/src/

      - name: Install local dependencies
        if: steps.ts-changed.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Type check (tsc)
        if: steps.ts-changed.outputs.changed == 'true'
        run: tsc --noEmit

      - name: Test
        if: steps.ts-changed.outputs.changed == 'true'
        run: bun test --coverage

      - name: Build (pre-check)
        if: steps.ts-changed.outputs.changed == 'true'
        run: |
          for d in runtime bootstrap; do
            if [ -d "adda-dev-runtime/src/$d" ] && ls adda-dev-runtime/src/$d/*.ts >/dev/null 2>&1; then
              bun build adda-dev-runtime/src/$d/*.ts --outdir /tmp/ci-build-check/$d/ --target bun
            fi
          done
          bun build proto-adda/src/runtime/render-adda-shell-tools.ts \
              --outdir /tmp/ci-build-check/proto-adda-runtime/ --target bun

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build adda-dev-runtime
        uses: docker/build-push-action@v6
        with:
          push: true
          file: adda-dev-runtime/Dockerfile
          context: .
          tags: |
            ghcr.io/nightjarrr/adda-dev-runtime:ci
            ghcr.io/nightjarrr/adda-dev-runtime:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/nightjarrr/adda-dev-runtime:buildcache
          cache-to: type=registry,ref=ghcr.io/nightjarrr/adda-dev-runtime:buildcache,mode=max

      - name: Build proto-adda
        uses: docker/build-push-action@v6
        with:
          push: true
          file: proto-adda/Dockerfile
          context: .
          build-args: BASE_TAG=${{ github.sha }}
          tags: |
            ghcr.io/nightjarrr/proto-adda-dev-runtime:ci
            ghcr.io/nightjarrr/proto-adda-dev-runtime:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/nightjarrr/proto-adda-dev-runtime:buildcache
          cache-to: type=registry,ref=ghcr.io/nightjarrr/proto-adda-dev-runtime:buildcache,mode=max

